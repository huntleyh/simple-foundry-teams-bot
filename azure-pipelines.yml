# ─────────────────────────────────────────────────────────────────────────────
# Combined pipeline: Deploy Hosted Agent → Deploy TypeScript ADK Agent
#
# Stage 1 (DeployHostedAgent): builds the greeting-agent container, pushes it
#   to ACR, and deploys the new version to Azure AI Foundry.
# Stage 2 (DeployAdkAgent):    builds and deploys the TypeScript ADK agent to Azure App Service.
#   Runs only after Stage 1 succeeds, so the agent server is always up to date.
#
# Pre-requisites (one-time setup):
#   1. Create an Azure Resource Manager service connection in ADO named
#      "azure-service-connection"  (Project Settings → Service connections).
#      The service principal needs:
#        • AcrPush on acragentfzu5sn
#        • Azure AI Developer (or Cognitive Services Contributor) on
#          the aifoundry9263 Cognitive Services account
#        • Website Contributor on the App Service
#
#   2. Create an Azure App Service (Linux, Node.js 22 LTS) in rg-aifoundry9263.
#      Set appServiceName below to match.
#
#   3. Add the following as secret pipeline variables
#      (Pipeline → Edit → Variables, lock icon to mark as secret):
#        FOUNDRY_API_KEY        — Foundry API key; omit to use managed identity
#
#   4. If this is the very first deployment, run locally once:
#        python deploy.py --grant-roles
#      Role assignment only needs to happen once per agent lifetime.
# ─────────────────────────────────────────────────────────────────────────────

# Trigger on changes to this repo (Teams bot)
trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - 'teamsapp/**'
      - '.env*'
      - 'azure-pipelines.yml'

# Also trigger when the adk-agent repo changes
resources:
  repositories:
    - repository: adkAgent
      type: git
      name: ToolBox/adk-agent-ts
      ref: refs/heads/main
      trigger:
        branches:
          include:
            - main
        paths:
          exclude:
            - '*.md'
            - '.env*'
            - 'azure-pipelines.yml'

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: azure-service-connection
  # Stage 1 — Hosted Agent
  acrRegistry: acragentfzu5sn
  agentImageName: greeting-agent
  # Stage 2 — TypeScript ADK Agent
  appServiceName: <your-app-service-name>       # ← replace with your App Service name
  resourceGroup: rg-aifoundry9263
  nodeVersion: '22.x'

stages:

# ── Stage 1 ──────────────────────────────────────────────────────────────────
- stage: DeployHostedAgent
  displayName: 'Stage 1 — Build & deploy hosted agent'
  jobs:
    - job: BuildAndDeploy
      displayName: 'Build image, push to ACR, deploy to Foundry'
      steps:
        - checkout: adkAgent
          displayName: 'Checkout adk-agent'

        - task: AzureCLI@2
          displayName: 'Build and push image to ACR'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr build \
                --registry $(acrRegistry) \
                --image $(agentImageName):$(Build.BuildId) \
                --file Dockerfile .

        - task: UsePythonVersion@0
          displayName: 'Use Python 3.12'
          inputs:
            versionSpec: '3.12'

        - script: pip install --quiet azure-ai-projects azure-identity python-dotenv
          displayName: 'Install deploy dependencies'

        - task: AzureCLI@2
          displayName: 'Deploy new agent version to Foundry'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            # AzureCLI@2 logs az in as the service principal, so DefaultAzureCredential
            # in deploy.py picks it up automatically via AzureCliCredential.
            inlineScript: |
              python deploy.py --image $(agentImageName):$(Build.BuildId)

# ── Stage 2 ──────────────────────────────────────────────────────────────────
- stage: DeployAdkAgent
  displayName: 'Stage 2 — Build & deploy TypeScript ADK agent'
  dependsOn: DeployHostedAgent
  jobs:
    - job: Deploy
      displayName: 'Build and deploy TypeScript agent'
      steps:
        - checkout: adkAgent
          displayName: 'Checkout adk-agent-ts'

        - task: NodeTool@0
          displayName: 'Use Node.js $(nodeVersion)'
          inputs:
            versionSpec: $(nodeVersion)

        - script: npm ci
          displayName: 'Install dependencies'

        - script: npm run build
          displayName: 'Compile TypeScript'

        - script: |
            cd $(Build.SourcesDirectory)
            zip -r $(Build.ArtifactStagingDirectory)/agent.zip \
              dist/ package.json package-lock.json
          displayName: 'Create deployment zip'

        - task: AzureWebApp@1
          displayName: 'Deploy to App Service'
          inputs:
            azureSubscription: $(serviceConnection)
            appType: webAppLinux
            appName: $(appServiceName)
            package: $(Build.ArtifactStagingDirectory)/agent.zip
            runtimeStack: 'NODE|22-lts'
            startUpCommand: 'npm ci --omit=dev && node dist/app_server.js'

        - task: AzureCLI@2
          displayName: 'Configure App Service settings'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az webapp config appsettings set \
                --resource-group $(resourceGroup) \
                --name $(appServiceName) \
                --settings \
                  FOUNDRY_API_KEY="$(FOUNDRY_API_KEY)" \
                  PORT=8088 \
                  WEBSITES_PORT=8088
