# ─────────────────────────────────────────────────────────────────────────────
# Combined pipeline: Deploy Hosted Agent → Deploy Teams Bot
#
# Stage 1 (DeployHostedAgent): builds the greeting-agent container, pushes it
#   to ACR, and deploys the new version to Azure AI Foundry.
# Stage 2 (DeployTeamsBot):    deploys the Teams bot to Azure App Service.
#   Runs only after Stage 1 succeeds, so the bot always points at a live agent.
#
# Pre-requisites (one-time setup):
#   1. Create an Azure Resource Manager service connection in ADO named
#      "azure-service-connection"  (Project Settings → Service connections).
#      The service principal needs:
#        • AcrPush on acragentfzu5sn
#        • Azure AI Developer (or Cognitive Services Contributor) on
#          the aifoundry9263 Cognitive Services account
#        • Website Contributor on the App Service
#
#   2. Create an Azure App Service (Linux, Python 3.12) in rg-aifoundry9263.
#      Set appServiceName below to match.
#
#   3. Add the following as secret pipeline variables
#      (Pipeline → Edit → Variables, lock icon to mark as secret):
#        MicrosoftAppPassword   — Bot App registration client secret
#        FOUNDRY_API_KEY        — (optional) Foundry API key; omit to use
#                                 managed identity / DefaultAzureCredential
#
#   4. If this is the very first deployment, run locally once:
#        python deploy.py --grant-roles
#      Role assignment only needs to happen once per agent lifetime.
# ─────────────────────────────────────────────────────────────────────────────

# Trigger on changes to this repo (Teams bot)
trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - 'teamsapp/**'
      - '.env*'
      - 'azure-pipelines.yml'

# Also trigger when the adk-agent repo changes
resources:
  repositories:
    - repository: adkAgent
      type: git
      name: ToolBox/adk-agent-ts
      ref: refs/heads/main
      trigger:
        branches:
          include:
            - main
        paths:
          exclude:
            - '*.md'
            - '.env*'
            - 'azure-pipelines.yml'

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: azure-service-connection
  # Stage 1 — Hosted Agent
  acrRegistry: acragentfzu5sn
  agentImageName: greeting-agent
  # Stage 2 — Teams Bot
  appServiceName: <your-app-service-name>       # ← replace with your App Service name
  resourceGroup: rg-aifoundry9263
  pythonVersion: '3.12'
  # Non-secret app settings — set secrets in pipeline Variables (lock icon)
  MicrosoftAppId: 1b82177f-70cb-4eb9-8ab0-1d4a9b015d98
  MicrosoftAppTenantId: 16b3c013-d300-468d-ac64-7eda0820b6d3
  AgentEndpoint: https://aifoundry9263.services.ai.azure.com/api/projects/agent-project/agents/greeting-agent/endpoint/protocols/openai/responses

stages:

# ── Stage 1 ──────────────────────────────────────────────────────────────────
- stage: DeployHostedAgent
  displayName: 'Stage 1 — Build & deploy hosted agent'
  jobs:
    - job: BuildAndDeploy
      displayName: 'Build image, push to ACR, deploy to Foundry'
      steps:
        - checkout: adkAgent
          displayName: 'Checkout adk-agent'

        - task: AzureCLI@2
          displayName: 'Build and push image to ACR'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr build \
                --registry $(acrRegistry) \
                --image $(agentImageName):$(Build.BuildId) \
                --file Dockerfile .

        - task: UsePythonVersion@0
          displayName: 'Use Python 3.12'
          inputs:
            versionSpec: '3.12'

        - script: pip install --quiet azure-ai-projects azure-identity python-dotenv
          displayName: 'Install deploy dependencies'

        - task: AzureCLI@2
          displayName: 'Deploy new agent version to Foundry'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            # AzureCLI@2 logs az in as the service principal, so DefaultAzureCredential
            # in deploy.py picks it up automatically via AzureCliCredential.
            inlineScript: |
              python deploy.py --image $(agentImageName):$(Build.BuildId)

# ── Stage 2 ──────────────────────────────────────────────────────────────────
- stage: DeployTeamsBot
  displayName: 'Stage 2 — Deploy Teams bot to App Service'
  dependsOn: DeployHostedAgent
  jobs:
    - job: Deploy
      displayName: 'Package and deploy bot'
      steps:
        - checkout: self
          displayName: 'Checkout simple-teams-bot'

        - task: UsePythonVersion@0
          displayName: 'Use Python $(pythonVersion)'
          inputs:
            versionSpec: $(pythonVersion)

        - script: |
            pip install --upgrade pip
            pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          displayName: 'Install dependencies'

        - task: ArchiveFiles@2
          displayName: 'Zip application'
          inputs:
            rootFolderOrFile: $(Build.SourcesDirectory)
            includeRootFolder: false
            archiveType: zip
            archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
            replaceExistingArchive: true
            excludePatterns: |
              .venv/**
              .git/**
              .github/**
              __pycache__/**
              devTools/**
              teamsapp/**
              *.md
              .env*

        - task: AzureWebApp@1
          displayName: 'Deploy to App Service'
          inputs:
            azureSubscription: $(serviceConnection)
            appType: webAppLinux
            appName: $(appServiceName)
            package: $(Build.ArtifactStagingDirectory)/app.zip
            runtimeStack: 'PYTHON|3.12'
            startUpCommand: 'python app.py'

        - task: AzureCLI@2
          displayName: 'Configure App Service settings'
          inputs:
            azureSubscription: $(serviceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az webapp config appsettings set \
                --resource-group $(resourceGroup) \
                --name $(appServiceName) \
                --settings \
                  MicrosoftAppId="$(MicrosoftAppId)" \
                  MicrosoftAppPassword="$(MicrosoftAppPassword)" \
                  MicrosoftAppTenantId="$(MicrosoftAppTenantId)" \
                  AGENT_ENDPOINT="$(AgentEndpoint)" \
                  FOUNDRY_API_KEY="$(FOUNDRY_API_KEY)" \
                  PORT=8000 \
                  WEBSITES_PORT=8000
